<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="cartHeader">
    <a href="index.html">←</a>
    <h1>Shopping Cart</h1>
    <div></div>
</header>

<main class="cartPage">

    <section class="cartItem">
        <img src="images/gatsby.jpg" alt="The Great Gatsby">

        <div class="cartDetails">
            <h2>The Great Gatsby</h2>
            <p>F. Scott Fitzgerald</p>
            <p class="cartCondition">Good</p>
            <p class="cartPrice">$8.50</p>
        </div>

        <div class="quantityBox">
            <button>−</button>
            <p>1</p>
            <button>+</button>
        </div>

        <button class="deleteButton">X</button>
    </section>

    <section class="cartItem">
        <img src="images/mockingbird.jpg" alt="To Kill a Mockingbird">

        <div class="cartDetails">
            <h2>To Kill a Mockingbird</h2>
            <p>Harper Lee</p>
            <p class="cartCondition">Very Good</p>
            <p class="cartPrice">$12.00</p>
        </div>

        <div class="quantityBox">
            <button>−</button>
            <p>1</p>
            <button>+</button>
        </div>

        <button class="deleteButton">X</button>
    </section>

    <section class="cartSummary">
        <div class="summaryRow">
            <p>Subtotal</p>
            <p>$20.50</p>
        </div>

        <div class="summaryRow">
            <p>Shipping</p>
            <p class="freeText">Free</p>
        </div>

        <div class="summaryTotal">
            <p>Total</p>
            <p>$20.50</p>
        </div>

        <a href="checkout.html" class="checkoutButton">Checkout</a>
    </section>

</main>

</body>
</html>
