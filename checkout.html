<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="checkoutHeader">
        <a href="cart.html" class="backButton">←</a>
        <h1>Checkout</h1>
        <div></div>
    </header>

    <main class="checkoutPage">

        <section class="checkoutForm">

            <h2>Customer Details</h2>

            <label>Full Name</label>
            <input id="fullNameInput" type="text" placeholder="Enter your full name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Shipping Address</label>
            <input type="text" placeholder="Enter your address">

            <h2>Payment Details</h2>

            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456">

            <div class="paymentRow">
                <div>
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY">
                </div>

                <div>
                    <label>CVV</label>
                    <input type="text" placeholder="123">
                </div>
            </div>

        </section>

        <section class="checkoutSummary">

            <h2>Order Summary</h2>

            <div class="summaryRow">
                <p>Subtotal</p>
                <p>$77.00</p>
            </div>

            <div class="summaryRow">
                <p>Shipping</p>
                <p class="freeText">Free</p>
            </div>

            <div class="summaryTotal">
                <p>Total</p>
                <p>$77.00</p>
            </div>

            <button class="placeOrderButton">Place Order</button>

        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
