<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    
</head>
<body>
    <header class="topBar">
        <div class="brand">
            <h1>Elizabeth Arcade</h1>
            <p>EST. 1987</p>
        </div> 

        <div class="searchBar">
            <input type="text" placeholder="Search titles, authors, ISBN..." />
        </div>

        <div class="actionButtons">
            <a href="cart.html">Shopping Cart</a>
            <a href="">Wishlist</a>

        </div>

    </header>
    <section class="categoryBar">
        <button>All</button>
        <button>Fiction</button>
        <button>Non-Fiction</button>
        <button>Poetry</button>
        <button>Rare</button>
        <button>Classics</button>
    </section>
    
    <section class="heroSection">
        <div class="heroContent">
            <p class="heroTag">Curated Collection</p>
    
            <h2>Every Book Has a Story</h2>
    
            <p class="heroText">
                Discover timeless classics and rare finds. Each piece carefully selected for the discerning reader.
            </p>
    
            <button class="heroButton">Explore Collection</button>
        </div>
    </section>

    

</body>
</html>
